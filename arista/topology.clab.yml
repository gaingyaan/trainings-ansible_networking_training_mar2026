name: ansible-lab

topology:
  nodes:
    R1:
      kind: arista_ceos
      image: ceos:4.35.3F
      startup-config: |
        username admin privilege 15 secret admin
        !
        management api http-commands
         no shutdown
        !

    R2:
      kind: arista_ceos
      image: ceos:4.35.3F
      startup-config: |
        username admin privilege 15 secret admin
        !
        management api http-commands
         no shutdown
        !

  links:
    - endpoints: ["R1:eth1", "R2:eth1"]