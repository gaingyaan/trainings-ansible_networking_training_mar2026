---
# ────────────────────────────────────────────────────────────────────────
# group_vars/ubuntu_hosts.yaml — Variables for Debian/Ubuntu hosts
# ────────────────────────────────────────────────────────────────────────
# Applies to hosts in [ubuntu_hosts] group only.
# Variables here override group_vars/all.yaml for these hosts.

ansible_user: ansible
# ansible_ssh_private_key_file: ~/.ssh/id_rsa

# Packages to install on Ubuntu systems
packages_required:
  - vim
  - curl
  - net-tools
  - tree
  - htop