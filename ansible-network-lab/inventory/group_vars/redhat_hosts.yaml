---
# ────────────────────────────────────────────────────────────────────────
# group_vars/redhat_hosts.yaml — Variables for RedHat-family hosts
# ────────────────────────────────────────────────────────────────────────
# Applies to hosts in [redhat_hosts] group only.
# Variables here override group_vars/all.yaml for these hosts.

ansible_user: ansible
# ansible_ssh_private_key_file: ~/.ssh/id_rsa

# Packages to install on RedHat systems
packages_required:
  - vim
  - curl
  - net-tools
  - tree
  - htop
