# inventory/hosts.ini
#
# This file defines all managed hosts and groups.
# Credentials and connection variables go in group_vars/ — never here.
#
# Syntax:
#   [group_name]               — defines a group
#   hostname  ansible_host=IP  — adds a host to the group with its IP
#
#   [group:children]           — a group made up of other groups
#   [group:vars]               — variables applied to all hosts in a group (avoid — use group_vars/ instead)
#
# Host patterns for ad-hoc commands:
#   ansible all               — all hosts
#   ansible ubuntu_hosts      — hosts in ubuntu_hosts group
#   ansible "R*"              — hosts matching a pattern

# ── Linux Hosts ────────────────────────────────────────
[ubuntu_hosts]
ubuntu-test  ansible_host=172.20.0.57

[redhat_hosts]
redhat-vm    ansible_host=3.128.89.105

[linux_hosts:children]
ubuntu_hosts
redhat_hosts

[ubuntu_hosts:vars]
ansible_username=rps
ansible_password=rps
ansible_become_password=rps
ansible_connection=ssh

[redhat_hosts:vars]
ansible_user=ec2-user
ansible_ssh_private_key_file=~/.ssh/redhat.pem